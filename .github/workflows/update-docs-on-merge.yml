name: Update Docs on PR Merge

# Automatically updates README version badge and CHANGELOG whenever a PR
# is merged to main. Commits back to main with [skip ci] to avoid loops.
#
# What it does:
#   1. Reads API_VERSION from src/main.py → updates README badge (live version)
#   2. Determines CHANGELOG version from the PR's milestone title (e.g.
#      "v0.9.10 - Advanced Features" → v0.9.10). Falls back to API_VERSION
#      if no milestone is set.
#   3. Adds the merged PR as a bullet under the matching CHANGELOG version section
#      (creates the section if it doesn't exist yet; uses "- unreleased" for the
#      date placeholder so only release.yml stamps the real date)
#   4. Commits and pushes the changes if anything changed
#   5. If API_VERSION changed vs the last semver tag, pushes the new git tag
#      pointing at the post-CHANGELOG commit (not the bare merge commit)

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  update-docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          # Use default GITHUB_TOKEN — sufficient for push to non-protected main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API_VERSION from src/main.py
        id: ver
        run: |
          VERSION=$(python3 - <<'PYEOF'
          import ast, sys
          tree = ast.parse(open('src/main.py').read())
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for t in node.targets:
                      if isinstance(t, ast.Name) and t.id == 'API_VERSION':
                          print(ast.literal_eval(node.value))
                          raise SystemExit(0)
          sys.exit(1)
          PYEOF)
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not find API_VERSION in src/main.py"
            exit 1
          fi
          echo "api_version=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected API_VERSION: v$VERSION"

      - name: Resolve CHANGELOG version from PR milestone (fallback to API_VERSION)
        id: changelog_ver
        env:
          MILESTONE_TITLE: ${{ github.event.pull_request.milestone.title }}
          API_VERSION:     ${{ steps.ver.outputs.api_version }}
        run: |
          # Parse vX.Y.Z from milestone title, e.g. "v0.9.10 - Advanced Features"
          MILESTONE_VER=$(echo "$MILESTONE_TITLE" | grep -oP 'v\d+\.\d+\.\d+' | head -1)
          if [ -n "$MILESTONE_VER" ]; then
            echo "version=$MILESTONE_VER" >> "$GITHUB_OUTPUT"
            echo "CHANGELOG version from milestone: $MILESTONE_VER"
          else
            echo "version=$API_VERSION" >> "$GITHUB_OUTPUT"
            echo "No milestone semver found — falling back to API_VERSION: $API_VERSION"
          fi

      - name: Update README version badge
        run: |
          TAG="${{ steps.ver.outputs.api_version }}"
          # Replace the semver in the shields.io badge URL
          sed -i "s|version-v[0-9][0-9.a-z]*-blue|version-${TAG}-blue|g" README.md
          echo "README badge → $TAG"

      - name: Update CHANGELOG
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          PR_URL:    ${{ github.event.pull_request.html_url }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          VERSION:   ${{ steps.changelog_ver.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import os, re
          from datetime import date

          pr_number = os.environ["PR_NUMBER"]
          pr_title  = os.environ["PR_TITLE"]
          pr_url    = os.environ["PR_URL"]
          pr_labels = os.environ["PR_LABELS"].lower()
          version   = os.environ["VERSION"]          # e.g. "v0.9.10"
          today     = date.today().isoformat()       # e.g. "2026-03-03"

          # Map GitHub labels → CHANGELOG subsection
          def subsection(labels: str) -> str:
              if any(l in labels for l in ("bug", "fix", "hotfix")):
                  return "Fixed"
              if any(l in labels for l in ("breaking", "deprecated")):
                  return "Changed"
              if "ci" in labels or "chore" in labels:
                  return "Changed"
              return "Added"

          sub = subsection(pr_labels)
          bullet = f"- **{pr_title}** ([#{pr_number}]({pr_url}))"

          with open("CHANGELOG.md", encoding="utf-8") as f:
              content = f.read()

          section_header = f"## [{version}]"

          if section_header in content:
              # Section exists — find or insert the right subsection
              sub_header = f"### {sub}"
              # Look for the subsection within this version's block
              # (between this section header and the next ## header)
              pattern = rf"({re.escape(section_header)}.*?)(### {sub}\n)(.*?)((?=\n## |\Z))"
              m = re.search(pattern, content, re.DOTALL)
              if m:
                  # Subsection exists — append bullet after existing bullets
                  insert_at = m.start(3) + len(m.group(3))
                  content = content[:insert_at] + bullet + "\n" + content[insert_at:]
              else:
                  # Subsection missing — insert it after the section header line
                  insert_marker = section_header
                  # Find end of section header line
                  pos = content.index(insert_marker)
                  eol = content.index("\n", pos) + 1
                  new_block = f"\n### {sub}\n{bullet}\n"
                  content = content[:eol] + new_block + content[eol:]
          else:
              # Section missing entirely — insert after the first "---" separator
              separator = "\n---\n"
              insert_pos = content.find(separator)
              if insert_pos == -1:
                  insert_pos = content.index("\n## ")  # fallback: before first section
              else:
                  insert_pos += len(separator)

              new_section = (
                  f"\n## [{version}] - unreleased\n\n"
                  f"### {sub}\n"
                  f"{bullet}\n"
                  f"\n---\n"
              )
              content = content[:insert_pos] + new_section + content[insert_pos:]

          with open("CHANGELOG.md", "w", encoding="utf-8") as f:
              f.write(content)

          print(f"CHANGELOG updated: [{version}] ### {sub} ← {bullet}")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: update README + CHANGELOG after PR #${{ github.event.pull_request.number }} [skip ci]"
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main && git push origin main; then
                break
              fi
              echo "Push attempt $i failed, retrying..."
              [ "$i" -eq 5 ] && exit 1
            done
            echo "Committed and pushed."
          else
            echo "No changes — README and CHANGELOG already up to date."
          fi

      - name: Push semver tag if API_VERSION is new
        # Runs after the CHANGELOG commit so the tag points at the updated state,
        # not the bare merge commit. Replaces the former tag-on-pr-merge job in
        # auto-tag.yml which raced against this workflow.
        run: |
          API_TAG="${{ steps.ver.outputs.api_version }}"
          if git ls-remote --tags origin "refs/tags/${API_TAG}" | grep -q .; then
            echo "Tag ${API_TAG} already exists — skipping"
          else
            git tag "${API_TAG}" "$(git rev-parse HEAD)"
            git push origin "${API_TAG}"
            echo "Pushed tag ${API_TAG} → $(git rev-parse HEAD)"
          fi
