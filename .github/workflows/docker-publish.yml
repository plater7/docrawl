name: Publish Docker Image

# Runs after the Release workflow completes successfully.
# This ensures the GitHub Release exists before the image is published.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse semver from tag
        id: semver
        run: |
          # head_branch for a tag-triggered workflow_run is the tag name (e.g. v0.9.10)
          RAW="${{ github.event.workflow_run.head_branch }}"
          VERSION="${RAW#v}"                     # strip leading 'v' → 0.9.10
          MINOR="${VERSION%.*}"                  # drop patch → 0.9
          IS_STABLE=$([[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && echo true || echo false)
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"      >> "$GITHUB_OUTPUT"
          echo "stable=$IS_STABLE" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c4a2a40f68dd1a87d78c41d3e6ee4e6b6  # v5.6.1
        with:
          images: ghcr.io/${{ github.repository_owner }}/docrawl
          tags: |
            type=raw,value=${{ steps.semver.outputs.version }}
            type=raw,value=${{ steps.semver.outputs.minor }},enable=${{ steps.semver.outputs.stable }}
            type=raw,value=latest,enable=${{ steps.semver.outputs.stable }}
            type=sha,prefix=sha-,format=short,value=${{ github.event.workflow_run.head_sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
