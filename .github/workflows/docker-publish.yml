name: Publish Docker Image

# Triggered when a GitHub Release is published (created by the Release workflow).
# Using `release: published` instead of `workflow_run` avoids the Scorecard
# DangerousWorkflow pattern: workflow_run + explicit ref checkout is always
# flagged regardless of whether the ref is trusted. With `release`, the
# trigger fires with the tag SHA as github.sha and no explicit ref is needed.
on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        # No explicit ref needed: the release trigger sets github.sha to the
        # tag's commit and actions/checkout uses that by default.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse semver from tag
        id: semver
        env:
          # github.ref_name is the tag name (e.g. v0.9.10) — not user-controlled
          # in a release event. Bound to env var to keep script safe.
          TAG_NAME: ${{ github.ref_name }}
        run: |
          RAW="${TAG_NAME}"
          VERSION="${RAW#v}"                     # strip leading 'v' → 0.9.10
          MINOR="${VERSION%.*}"                  # drop patch → 0.9
          IS_STABLE=$([[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && echo true || echo false)
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"      >> "$GITHUB_OUTPUT"
          echo "stable=$IS_STABLE" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c4a2a40f68dd1a87d78c41d3e6ee4e6b6  # v5.6.1
        with:
          images: ghcr.io/${{ github.repository_owner }}/docrawl
          tags: |
            type=raw,value=${{ steps.semver.outputs.version }}
            type=raw,value=${{ steps.semver.outputs.minor }},enable=${{ steps.semver.outputs.stable }}
            type=raw,value=latest,enable=${{ steps.semver.outputs.stable }}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
