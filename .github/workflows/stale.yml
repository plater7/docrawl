name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 4 * * 0"  # Weekly Sunday 04:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639  # v9.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 7
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 7 days if no further activity occurs.
            If this is still relevant, please comment or remove the `stale` label.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 7 days if no further activity occurs.
            If this is still relevant, please rebase or comment to keep it open.
          close-issue-message: "Closing due to inactivity. Reopen if this is still relevant."
          close-pr-message: "Closing due to inactivity. Reopen and rebase if this is still needed."
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,in-progress"
          exempt-pr-labels: "pinned,security,in-progress"
          exempt-all-assignees: true
          operations-per-run: 150
