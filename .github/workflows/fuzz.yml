name: Fuzzing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0"  # Weekly Sunday at 03:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install pip==26.0.1
          pip install atheris
          pip install -r requirements.txt

      - name: Fuzz url validator
        run: python fuzz/fuzz_url_validator.py -atheris_runs=5000
        env:
          PYTHONPATH: .

      - name: Fuzz url filter
        run: python fuzz/fuzz_url_filter.py -atheris_runs=5000
        env:
          PYTHONPATH: .

      - name: Fuzz css selectors
        run: python fuzz/fuzz_css_selectors.py -atheris_runs=5000
        env:
          PYTHONPATH: .
