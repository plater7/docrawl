name: Update SNAPSHOT.md

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "Dockerfile"
      - "docker/**"
      - "docker-compose.yml"
      - "docker-compose.yaml"
      - "pyproject.toml"
      - "scripts/generate_snapshot.py"

  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the commit shows correct author
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SNAPSHOT.md
        run: python scripts/generate_snapshot.py

      - name: Check for changes
        id: diff
        run: |
          git add SNAPSHOT.md
          if git diff --cached --quiet SNAPSHOT.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated snapshot
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: auto-update SNAPSHOT.md [skip ci]"
          git push
