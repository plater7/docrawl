name: Update SNAPSHOT.md

on:
  # Run on every push to main (i.e. every PR merge) to keep SNAPSHOT.md
  # consistent regardless of which files changed in the merge.
  push:
    branches: [main]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need full history so the commit shows correct author
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Generate SNAPSHOT.md
        run: python scripts/generate_snapshot.py

      - name: Check for changes
        id: diff
        run: |
          git add SNAPSHOT.md
          if git diff --cached --quiet SNAPSHOT.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated snapshot
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: auto-update SNAPSHOT.md [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              break
            fi
            echo "Push attempt $i failed, retrying..."
            [ "$i" -eq 5 ] && exit 1
          done
