name: Update Memory

# Regenerates docs/MEMORY.md whenever code is pushed to main.
# Follows the same pattern as update-docs-on-merge.yml:
#   1. Checks out the repo
#   2. Runs scripts/generate_memory.py
#   3. Commits the updated MEMORY.md with [skip ci]
#
# The script reads metadata from src/, docs/, pytest.ini, requirements.txt,
# .github/workflows/, etc. and renders a Claude Code CLI memory file.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/MEMORY.md'

permissions:
  contents: write

concurrency:
  group: update-memory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-memory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip if the commit message contains [skip ci] to avoid loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Generate MEMORY.md
        run: python scripts/generate_memory.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/MEMORY.md
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to docs/MEMORY.md"
          else
            git commit -m "docs: auto-update MEMORY.md [skip ci]"
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main && git push; then
                break
              fi
              echo "Push attempt $i failed, retrying..."
              [ "$i" -eq 5 ] && exit 1
            done
          fi
