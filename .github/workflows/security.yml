name: Security

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main, "feat/**"]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install pip==26.0.1
          pip install bandit==1.8.3 pip-audit==2.9.0
          pip install -r requirements.txt

      - name: Bandit security scan
        run: bandit -r src/ -f json -o bandit-report.json -ll

      - name: Bandit summary
        if: always()
        run: bandit -r src/ -f screen -ll

      - name: pip-audit dependency check
        # CVE-2026-4539 / GHSA-5239-wwwm-4pmq: pygments transitive dep (uvicorn→rich→pygments)
        # No fix version available yet; remove ignore when pygments publishes a patch.
        run: pip-audit --strict --ignore-vuln CVE-2026-4539

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: bandit-report
          path: bandit-report.json
