name: Auto Tag

# Pushes a semver tag automatically when:
#   1. A milestone whose title contains vX.Y.Z is closed (primary trigger)
#   2. Manually via workflow_dispatch (fallback / backfill)
#
# Tag-on-PR-merge was removed: that responsibility now lives at the end of
# update-docs-on-merge.yml, which pushes the tag AFTER committing the
# CHANGELOG update. This prevents a race condition where the tag pointed at
# the bare merge commit and the release body was missing the last bullet.
#
# Once the tag is pushed, release.yml picks it up via `push: tags: v*`.

on:
  milestone:
    types: [closed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to push (e.g. v0.9.10)"
        required: true
      commit_sha:
        description: "Commit SHA to tag (default: HEAD of main)"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Trigger: milestone closed ─────────────────────────────────────────────
  tag-on-milestone-close:
    if: github.event_name == 'milestone'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main          # always tag the tip of main, not an arbitrary runner SHA
          fetch-depth: 0

      - name: Extract version from milestone title
        id: ver
        run: |
          TITLE="${{ github.event.milestone.title }}"
          TAG=$(echo "$TITLE" | grep -oP 'v\d+\.\d+\.\d+' | head -1)
          if [ -z "$TAG" ]; then
            echo "No semver found in milestone title: '$TITLE' — skipping"
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Push tag if new
        if: steps.ver.outputs.tag != ''
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists — skipping"
          else
            # Explicitly tag the current HEAD of main (fetched above with ref: main)
            git tag "$TAG" "$(git rev-parse HEAD)"
            git push origin "$TAG"
            echo "Pushed tag $TAG → $(git rev-parse HEAD)"
          fi

  # ── Trigger: manual dispatch ──────────────────────────────────────────────
  tag-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Push tag
        run: |
          TAG="${{ github.event.inputs.version }}"
          # Allow caller to target a specific commit; default to main HEAD
          TARGET="${{ github.event.inputs.commit_sha }}"
          if [ -z "$TARGET" ]; then
            TARGET="$(git rev-parse HEAD)"
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists — skipping"
          else
            git tag "$TAG" "$TARGET"
            git push origin "$TAG"
            echo "Pushed tag $TAG → $TARGET"
          fi
