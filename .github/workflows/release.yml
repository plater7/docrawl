name: Release

on:
  push:
    tags:
      - "v*"
  # Also fires when a release is created/published via the GitHub web UI,
  # GH CLI (`gh release create`), or API — ensuring the CHANGELOG stamp and
  # release notes extraction always run regardless of how the release is made.
  release:
    types: [created, published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-flight release

permissions:
  contents: read
  id-token: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main          # check out main so we can push the date stamp back
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp release date in CHANGELOG.md
        # Replace "- unreleased" with today's ISO date and push to main so the
        # CHANGELOG file on the default branch always shows the real release date.
        # Must run before notes extraction so the release body also has the date.
        run: |
          TAG="${{ github.ref_name }}"
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s|## \[${TAG}\] - unreleased|## [${TAG}] - ${TODAY}|" CHANGELOG.md
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: stamp release date ${TODAY} for ${TAG} [skip ci]"
            git push origin HEAD:main
            echo "Stamped ${TODAY} for ${TAG}"
          else
            echo "No unreleased placeholder — CHANGELOG already dated or section missing"
          fi

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          python3 - <<'PYEOF'
          import re, sys

          tag = "${{ github.ref_name }}"   # e.g. "v0.9.10"

          with open("CHANGELOG.md", encoding="utf-8") as f:
              content = f.read()

          # Match ## [v0.9.10] - date  OR  ## [v0.9.10] (with or without date)
          pattern = rf"(?m)^## \[{re.escape(tag)}\][^\n]*\n(.*?)(?=\n## |\Z)"
          m = re.search(pattern, content, re.DOTALL)

          notes = m.group(1).strip() if m else f"Release {tag}. See CHANGELOG.md for details."

          with open("/tmp/release_notes.md", "w", encoding="utf-8") as f:
              f.write(notes)

          print(f"Extracted {len(notes)} chars of notes for {tag}")
          PYEOF

      - name: Detect pre-release
        id: prerelease
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '(alpha|beta|rc)'; then
            echo "is_prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          body_path: /tmp/release_notes.md
          generate_release_notes: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
